name: Weekly SEO Reports

on:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10am UTC
  workflow_dispatch:

jobs:
  seo-reports:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Write GA4 credentials
        env:
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p seo/credentials
          echo "$GA4_SERVICE_ACCOUNT_JSON" > seo/credentials/ga4-service-account.json

      - name: Write GSC credentials
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GSC_SERVICE_ACCOUNT_JSON" > seo/credentials/gsc-service-account.json

      - name: GA4 digest
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: python seo/agents/ga4_digest.py --days 7
        continue-on-error: true

      - name: Rankings report
        run: python seo/agents/rankings_tracker.py --days 28
        continue-on-error: true

      - name: Keyword gap analysis
        run: python seo/agents/keyword_gap.py --days 90
        continue-on-error: true

      - name: PageSpeed monitor
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: python seo/agents/pagespeed_monitor.py
        continue-on-error: true

      - name: Conversion tracker
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: python seo/agents/conversion_tracker.py --days 7
        continue-on-error: true

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seo/reports/
          git diff --staged --quiet || git commit -m "seo: weekly reports $(date -I)"
          git push

      - name: Email reports
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Rose Medical SEO Report — ${{ github.run_id }}"
          to: benjaminsher@gmail.com,tz@rosemedicalpavilion.com
          from: benjamin@rosemedicalpavilion.com
          body: |
            Weekly SEO report for Rose Medical Pavilion is ready.

            Reports are committed to the repo at seo/reports/.

            — GitHub Actions
          attachments: seo/reports/*.md
