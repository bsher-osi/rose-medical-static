name: Update Sitemap

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - '!seo/**'

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyyaml

      - run: python seo/agents/update_sitemap.py

      - name: Commit updated sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "seo: auto-update sitemap.xml"
          git push
