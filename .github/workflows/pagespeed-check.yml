name: PageSpeed Check

on:
  push:
    branches: [main]
    paths:
      - 'refresh.css'
      - 'wp-content/**'
      - '**/*.css'
      - '**/*.js'

jobs:
  pagespeed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run PageSpeed
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: |
          mkdir -p seo/reports
          python seo/agents/pagespeed_monitor.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: pagespeed-report
          path: seo/reports/pagespeed-*.md
