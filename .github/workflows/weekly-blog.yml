name: Blog Post Generator

on:
  schedule:
    - cron: '0 14 * * 1'  # Monday    9am MST
    - cron: '0 14 * * 3'  # Wednesday 9am MST
    - cron: '0 14 * * 5'  # Friday    9am MST
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of posts to generate'
        default: '1'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic pyyaml

      - name: Generate blog posts and email drafts for review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USER: ${{ secrets.GMAIL_USERNAME }}
          SMTP_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          python seo/agents/blog_writer.py --count "$COUNT"

      - name: Commit and deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blogs/
          git diff --staged --quiet || git commit -m "content: add blog post(s) $(date -I)"
          git push
